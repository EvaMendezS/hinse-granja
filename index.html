<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

  <!-- PWA -->
  <meta name="theme-color" content="#241a12"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Hinse"/>

  <title>Hinse — Granja Avícola</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icon-192.png"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css"/>

  <!-- Chart.js LOCAL (IMPORTANTE para offline) -->
  <script src="chart.umd.min.js"></script>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-egg">
      <svg viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg" width="80" height="96">
        <defs>
          <radialGradient id="eg" cx="38%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#f5e6c8"/>
            <stop offset="55%" stop-color="#e8c87a"/>
            <stop offset="100%" stop-color="#a86828"/>
          </radialGradient>
          <radialGradient id="es" cx="32%" cy="28%" r="30%">
            <stop offset="0%" stop-color="#fff8ee" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#fff8ee" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="40" cy="52" rx="32" ry="40" fill="url(#eg)"/>
        <ellipse cx="40" cy="52" rx="32" ry="40" fill="url(#es)"/>
      </svg>
    </div>
    <h1>Hinse</h1>
    <p>Granja Avícola</p>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">🐔</span>
      <div>
        <span class="topbar-title">Hinse</span>
        <span class="topbar-subtitle">Granja Avícola</span>
      </div>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" id="btnPDF">📄</button>
      <button class="icon-btn" id="btnExcel">📊</button>
      <button class="icon-btn" id="btnBackup">💾</button>
      <button class="icon-btn" id="btnRestore">📂</button>
      <input type="file" id="fileRestore" accept=".json" style="display:none"/>
    </div>
  </header>

  <main class="main-content">

    <!-- DASHBOARD -->
    <section id="view-dashboard" class="view active">
      <div class="view-header">
        <h2>Dashboard</h2>
        <span id="dashDate"></span>
      </div>

      <div id="kpiGrid"></div>

      <div class="section-block">
        <h3>⚠️ Alertas</h3>
        <div id="alertasList"></div>
      </div>

      <div class="section-block">
        <h3>🕐 Actividad Reciente</h3>
        <div id="actividadList"></div>
      </div>
    </section>

    <!-- TODAS LAS DEMÁS VISTAS IGUAL (NO TOCADAS) -->
    <!-- (esto lo dejo igual porque ya estaba perfecto) -->

    <!-- LOTE -->
    <section id="view-lote" class="view">
      <div class="view-header">
        <h2>Lotes</h2>
        <button id="btnNuevoLote">+ Nuevo Lote</button>
      </div>
      <div id="loteList"></div>
    </section>

    <!-- MORTANDAD -->
    <section id="view-mortandad" class="view">
      <div class="view-header">
        <h2>Mortandad</h2>
        <button id="btnNuevaMortandad">+ Registrar</button>
      </div>
      <div id="mortandadList"></div>
    </section>

    <!-- ENFERMEDADES -->
    <section id="view-enfermedades" class="view">
      <div class="view-header">
        <h2>Enfermedades</h2>
        <button id="btnNuevaEnfermedad">+ Registrar</button>
      </div>
      <div id="enfermedadList"></div>
    </section>

  </main>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">📊</button>
    <button class="nav-btn" data-view="lote">🐣</button>
    <button class="nav-btn" data-view="mortandad">💀</button>
    <button class="nav-btn" data-view="enfermedades">🦠</button>
  </nav>

</div>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registrado'))
      .catch(err => console.error('SW error:', err));
  });
}
</script>

</body>
</html>
