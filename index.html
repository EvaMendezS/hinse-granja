<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hinse Granja</title>

  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<div id="app">

  <!-- TOP -->
  <header class="topbar">
    <h2>🐔 Hinse</h2>
  </header>

  <!-- DASHBOARD -->
  <section id="view-dashboard" class="view active">

    <div id="kpiGrid"></div>

    <!-- ❌ SIN GRAFICO -->

    <h3>Actividad</h3>
    <div id="actividadList"></div>

  </section>

  <!-- LOTES -->
  <section id="view-lote" class="view">
    <h2>Ingresos</h2>
    <button onclick="openModal('modalLote')">+ Nuevo</button>
    <div id="loteList"></div>
  </section>

  <!-- VACUNACION -->
  <section id="view-vacunacion" class="view">
    <h2>Vacunación</h2>
    <button onclick="openModal('modalVacunacion')">+ Registrar</button>
    <div id="vacunacionList"></div>
  </section>

  <!-- MORTANDAD -->
  <section id="view-mortandad" class="view">
    <h2>Mortandad</h2>
    <button onclick="openModal('modalMortandad')">+ Registrar</button>
    <div id="mortandadList"></div>
  </section>

</div>

<!-- ================= MODALES ================= -->

<!-- LOTE -->
<div id="modalLote" class="modal-overlay hidden">
  <div class="modal">
    <h3>Lote</h3>
    <input type="hidden" id="loteId">
    <input type="date" id="loteFecha">
    <input type="text" id="loteNombre" placeholder="Nombre">
    <input type="number" id="loteCantidad" placeholder="Cantidad">
    <button onclick="saveLote()">Guardar</button>
    <button onclick="closeModal('modalLote')">Cerrar</button>
  </div>
</div>

<!-- VACUNACION -->
<div id="modalVacunacion" class="modal-overlay hidden">
  <div class="modal">
    <h3>Vacunación</h3>
    <input type="date" id="vacunacionFecha">
    <select id="vacunacionLote"></select>
    <input type="text" id="vacunaNombre" placeholder="Vacuna">
    <input type="date" id="vacunaProxima">
    <button onclick="saveVacunacion()">Guardar</button>
    <button onclick="closeModal('modalVacunacion')">Cerrar</button>
  </div>
</div>

<!-- MORTANDAD -->
<div id="modalMortandad" class="modal-overlay hidden">
  <div class="modal">
    <h3>Mortandad</h3>
    <input type="date" id="mortandadFecha">
    <select id="mortandadLote"></select>
    <input type="number" id="mortandadCantidad">
    <button onclick="saveMortandad()">Guardar</button>
    <button onclick="closeModal('modalMortandad')">Cerrar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
