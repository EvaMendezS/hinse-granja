<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a2e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hinse" />
  <title>Hinse — Granja Avícola</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-egg">🥚</div>
    <h1>Hinse</h1>
    <p>Granja Avícola</p>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">🐔</span>
      <span class="topbar-title">Hinse</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btnBackup">💾</button>
      <button class="icon-btn" id="btnRestore">📂</button>
      <input type="file" id="fileRestore" accept=".json" style="display:none" />
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- DASHBOARD -->
    <section id="view-dashboard" class="view active">
      <div class="view-header">
        <h2>Dashboard</h2>
        <span class="view-date" id="dashDate"></span>
      </div>

      <div class="kpi-grid" id="kpiGrid"></div>

      <!-- 🔴 CAMBIO: gráfico eliminado -->
      <div class="chart-card" style="margin-bottom:16px">
        <h3>Mortandad últimos 7 días</h3>
        <div class="chart-placeholder">
          📊 Estadísticas de mortandad desactivadas
        </div>
      </div>

      <div class="section-block">
        <h3 class="section-title">⚠️ Alertas</h3>
        <div id="alertasList"></div>
      </div>

      <div class="section-block">
        <h3 class="section-title">🕐 Actividad Reciente</h3>
        <div id="actividadList"></div>
      </div>
    </section>

    <!-- LOTE -->
    <section id="view-lote" class="view">
      <div class="view-header">
        <h2>Ingreso de Pollitas</h2>
        <button class="btn-primary" onclick="openModal('modalLote')">+ Nuevo Ingreso</button>
      </div>
      <div id="loteList" class="card-list"></div>
    </section>

    <!-- POSTURA -->
    <section id="view-postura" class="view">
      <div class="view-header">
        <h2>Registro de Postura</h2>
        <button class="btn-primary" onclick="openModal('modalPostura')">+ Registrar</button>
      </div>
      <div class="filter-bar">
        <input type="month" id="filtroPosturaMes" onchange="renderPostura()" />
      </div>
      <div id="posturaList" class="card-list"></div>
    </section>

    <!-- ALIMENTACIÓN -->
    <section id="view-alimentacion" class="view">
      <div class="view-header">
        <h2>Alimentación</h2>
        <button class="btn-primary" onclick="openModal('modalAlimentacion')">+ Registrar</button>
      </div>
      <div id="alimentacionList" class="card-list"></div>
    </section>

    <!-- VACUNACIÓN -->
    <section id="view-vacunacion" class="view">
      <div class="view-header">
        <h2>Vacunación</h2>
        <button class="btn-primary" onclick="openModal('modalVacunacion')">+ Registrar</button>
      </div>
      <div id="vacunacionList" class="card-list"></div>
    </section>

    <!-- MEDICACIÓN -->
    <section id="view-medicacion" class="view">
      <div class="view-header">
        <h2>Medicación</h2>
        <button class="btn-primary" onclick="openModal('modalMedicacion')">+ Registrar</button>
      </div>
      <div id="medicacionList" class="card-list"></div>
    </section>

    <!-- MORTANDAD -->
    <section id="view-mortandad" class="view">
      <div class="view-header">
        <h2>Mortandad</h2>
        <button class="btn-primary" onclick="openModal('modalMortandad')">+ Registrar</button>
      </div>
      <div id="mortandadList" class="card-list"></div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">
      <span class="nav-icon">📊</span><span class="nav-label">Inicio</span>
    </button>
    <button class="nav-btn" data-view="lote">
      <span class="nav-icon">🐣</span><span class="nav-label">Lote</span>
    </button>
    <button class="nav-btn" data-view="mortandad">
      <span class="nav-icon">💀</span><span class="nav-label">Muertes</span>
    </button>
    <button class="nav-btn" data-view="alimentacion">
      <span class="nav-icon">🌾</span><span class="nav-label">Alimento</span>
    </button>
    <button class="nav-btn" data-view="vacunacion">
      <span class="nav-icon">💉</span><span class="nav-label">Sanidad</span>
    </button>
  </nav>

  <!-- MÁS MENU -->
  <div id="masMenu" class="mas-menu hidden">
    <button class="mas-btn" data-view="medicacion">💊 Medicación</button>
    <button class="mas-btn" data-view="postura">🥚 Postura</button>
  </div>

</div>

<!-- MODALES (SIN CAMBIOS) -->
<!-- ... TODO TU CÓDIGO DE MODALES SE MANTIENE IGUAL ... -->

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- 🔴 CAMBIO IMPORTANTE: se eliminó Chart.js -->
<script src="app.js"></script>

</body>
</html>
